<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ativos Digitales</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>
    <style>
        .hero{
            height: 50%;
        }
        .hero-content{
            margin-top: 60px;
        }

        .admin-content{
            padding: 0 40px;

        }

        .admin-content h2{
            text-align: center;
            font-family: poppins;
        }

        .admin-content button{
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #2b2b2c;
            color: white;
            font-size: 15px;
            margin-top: 30px;

        }

        /* Fondo oscuro */
        .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.8);
        }

        /* Caja del modal */
        .modal-contenido {
        background: #111;
        color: white;
        width: 300px;
        margin: 10% auto;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 20px red;
        text-align: center;
        }

        /* Botón cerrar */
        .cerrar {
        float: right;
        cursor: pointer;
        font-size: 20px;
        }

        /* Inputs */
        input {
        width: 90%;
        margin: 10px 0;
        padding: 8px;
        border: none;
        border-radius: 5px;
        }

        /* Botón */
        button {
        background: red;
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
        border-radius: 5px;
        }
    </style>
    <div class="fondo"></div>
    <div class="overlay"></div>

    
    <section class="hero">
        <div class="hero-content">
            <p class="p1">Bienvenido</p>
            <h1>Administrador</h1>
        </div>
    </section>

    <section class="admin-content">
        <h2>Subir contenido al Portafolio</h2>
    
    <button id="abrirModal">Agregar Producto</button>

    <div id="modal" class="modal">
    <div class="modal-contenido">
        <span class="cerrar">&times;</span>
        
        <h2>Nuevo Producto</h2>

        <form id="formulario">
        <input type="text" placeholder="Nombre" required>

        <input type="text" placeholder="Categoría" required>

        <input type="file" id="imagenInput" accept="image/*">
        <button type="button" id="quitarImagen" style="display:none;">
        X
        </button>
        <img id="preview" style="width:100px; margin-top:10px; display:none;">

        
        <button type="submit">Guardar</button>
        </form>
    </div>
    </div>

</section>
    

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
